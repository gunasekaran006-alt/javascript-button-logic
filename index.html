<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name ="Description" content="Create a simple JavaScript like button.">
    <title> javascript-button-logic</title>
 <style>
        /* CSS to make it look clean and centered */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
        }

        .like-btn {
            background: none;
            border: 2px solid #ddd;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto;
        }

        /* Style when the button is "Liked" */
        .like-btn.active {
            border-color: #ed4956;
            color: #ed4956;
            transform: scale(1.1);
        }

        .count-text {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- The Button -->
        <button id="likeBtn" class="like-btn">
            <span id="heart">🤍</span> Like
        </button>

        <!-- The Counter -->
        <p class="count-text"><span id="count">0</span> Likes</p>
    </div>

    <script>
        // JavaScript Logic
        const likeBtn = document.getElementById('likeBtn');
        const countDisplay = document.getElementById('count');
        const heartIcon = document.getElementById('heart');

        let count = 0;
        let isLiked = false;

        likeBtn.addEventListener('click', () => {
            if (!isLiked) {
                // If not liked: increment and change style
                count++;
                heartIcon.innerText = '❤️'; // Red heart
                likeBtn.classList.add('active');
                isLiked = true;
            } else {
                // If already liked: decrement and reset style
                count--;
                heartIcon.innerText = '🤍'; // White heart
                likeBtn.classList.remove('active');
                isLiked = false;
            }

            // Update the text on screen
            countDisplay.innerText = count;
        });
    </script>

</body>
</html>
